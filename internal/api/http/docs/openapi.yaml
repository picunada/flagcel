openapi: 3.0.3
info:
  title: Flagcel API
  description: Feature flag service with CEL-based targeting rules.
  version: "1.0.0"
servers:
  - url: http://localhost:8080/api/v1
    description: Local dev

tags:
  - name: Auth
  - name: Flags
  - name: Rules
  - name: Contexts
  - name: Evaluation
  - name: API Keys

paths:
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current admin session
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current auth state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /flags:
    get:
      tags: [Flags]
      summary: List flags
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Flags list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagListEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Flags]
      summary: Create or replace a flag
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlagRequest"
      responses:
        "200":
          description: Flag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/InvalidRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /flags/{key}:
    parameters:
      - $ref: "#/components/parameters/FlagKey"
    get:
      tags: [Flags]
      summary: Get a flag by key
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/FlagNotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Flags]
      summary: Delete a flag and all of its rules
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Flag deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /flags/{key}/evaluate:
    parameters:
      - $ref: "#/components/parameters/FlagKey"
    post:
      tags: [Flags]
      summary: Evaluate one flag with diagnostic trace
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRequest"
      responses:
        "200":
          description: Evaluation trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalTraceEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/FlagNotFound" }
        "422": { $ref: "#/components/responses/InvalidRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /flags/{key}/rules:
    parameters:
      - $ref: "#/components/parameters/FlagKey"
    get:
      tags: [Rules]
      summary: List rules for a flag
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleListEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/FlagNotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Rules]
      summary: Create a rule
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleRequest"
      responses:
        "200":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/InvalidRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /flags/{key}/rules/reorder:
    parameters:
      - $ref: "#/components/parameters/FlagKey"
    post:
      tags: [Rules]
      summary: Reorder rules
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRulesRequest"
      responses:
        "204":
          description: Rules reordered
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/RuleNotFound" }
        "422": { $ref: "#/components/responses/InvalidRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /flags/{key}/rules/{id}:
    parameters:
      - $ref: "#/components/parameters/FlagKey"
      - $ref: "#/components/parameters/RuleID"
    get:
      tags: [Rules]
      summary: Get a rule
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/RuleNotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    put:
      tags: [Rules]
      summary: Update a rule
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRuleRequest"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/RuleNotFound" }
        "422": { $ref: "#/components/responses/InvalidRequest" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Rules]
      summary: Delete a rule
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Rule deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/RuleNotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /contexts:
    get:
      tags: [Contexts]
      summary: List context schemas
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Context list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextListEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Contexts]
      summary: Create a context schema
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContextRequest"
      responses:
        "200":
          description: Context created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/InvalidRequest" }

  /contexts/{id}:
    parameters:
      - $ref: "#/components/parameters/ContextID"
    get:
      tags: [Contexts]
      summary: Get a context schema
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ContextNotFound" }
    put:
      tags: [Contexts]
      summary: Update a context schema
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContextRequest"
      responses:
        "200":
          description: Context updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ContextNotFound" }
    delete:
      tags: [Contexts]
      summary: Delete a context schema
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Context deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ContextNotFound" }

  /eval:
    post:
      tags: [Evaluation]
      summary: Evaluate all flags
      security:
        - bearerAPIKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRequest"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalAllEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /eval/{key}:
    parameters:
      - $ref: "#/components/parameters/FlagKey"
    post:
      tags: [Evaluation]
      summary: Evaluate one flag
      security:
        - bearerAPIKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalRequest"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/FlagNotFound" }

  /api-keys:
    get:
      tags: [API Keys]
      summary: List evaluation API keys
      security:
        - sessionCookie: []
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [API Keys]
      summary: Create an evaluation API key
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "200":
          description: API key created; token is returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/InvalidRequest" }

  /api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/APIKeyID"
    delete:
      tags: [API Keys]
      summary: Revoke an evaluation API key
      security:
        - sessionCookie: []
      responses:
        "204":
          description: API key revoked
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/APIKeyNotFound" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: flagcel_session
    bearerAPIKey:
      type: http
      scheme: bearer

  parameters:
    FlagKey:
      name: key
      in: path
      required: true
      schema:
        type: string
        example: new-checkout
    RuleID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContextID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    APIKeyID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    SuccessEnvelope:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
          example: success
        data: {}

    User:
      type: object
      required: [id, email, admin]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        admin: { type: boolean }

    AuthMe:
      type: object
      required: [auth_enabled, authenticated]
      properties:
        auth_enabled: { type: boolean }
        mode:
          type: string
          enum: [oidc, password]
        authenticated: { type: boolean }
        user:
          $ref: "#/components/schemas/User"

    AuthMeEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthMe"

    Rollout:
      type: object
      required: [percentage]
      properties:
        percentage:
          type: integer
          minimum: 0
          maximum: 100
          example: 25
        bucket_by:
          type: string
          example: user.id

    Rule:
      type: object
      required: [id, expression, rollout]
      properties:
        id: { type: string, format: uuid }
        expression:
          type: string
          example: "user.country == 'US'"
        rollout:
          $ref: "#/components/schemas/Rollout"

    Flag:
      type: object
      required: [key, enabled, rules, default_value]
      properties:
        key: { type: string, example: new-checkout }
        enabled: { type: boolean }
        rules:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
        default_value: { type: boolean }
        context_id:
          type: string
          format: uuid
          nullable: true

    CreateFlagRequest:
      type: object
      required: [key]
      properties:
        key: { type: string }
        enabled: { type: boolean, default: false }
        rules:
          type: array
          items:
            $ref: "#/components/schemas/CreateRuleRequest"
          default: []
        default_value: { type: boolean, default: false }
        context_id:
          type: string
          format: uuid
          nullable: true

    CreateRuleRequest:
      type: object
      required: [expression, rollout]
      properties:
        expression: { type: string }
        rollout:
          $ref: "#/components/schemas/Rollout"

    UpdateRuleRequest:
      $ref: "#/components/schemas/CreateRuleRequest"

    ReorderRulesRequest:
      type: object
      required: [rule_ids]
      properties:
        rule_ids:
          type: array
          items:
            type: string
            format: uuid

    ContextField:
      type: object
      required: [path, type]
      properties:
        path: { type: string, example: user.country }
        type:
          type: string
          enum: [string, int, double, bool, timestamp, list, map]

    Context:
      type: object
      required: [id, name, fields]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ContextField"

    CreateContextRequest:
      type: object
      required: [name, fields]
      properties:
        name: { type: string }
        description: { type: string }
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ContextField"

    EvalRequest:
      type: object
      required: [context]
      properties:
        context:
          type: object
          additionalProperties: true

    EvalResponse:
      type: object
      required: [key, value]
      properties:
        key: { type: string }
        value: { type: boolean }

    EvalMatchedRule:
      type: object
      required: [id, index, expression]
      properties:
        id: { type: string, format: uuid }
        index: { type: integer, minimum: 0 }
        expression: { type: string }

    EvalRuleResult:
      type: object
      required: [id, index, expression, matched]
      properties:
        id: { type: string, format: uuid }
        index: { type: integer, minimum: 0 }
        expression: { type: string }
        matched: { type: boolean }
        error: { type: string }

    EvalBucket:
      type: object
      required: [bucket_by, percentage, in_rollout, missing]
      properties:
        bucket_by: { type: string }
        bucket_value: { type: string }
        bucket_number: { type: integer, minimum: 0, maximum: 99 }
        percentage: { type: integer, minimum: 0, maximum: 100 }
        in_rollout: { type: boolean }
        missing: { type: boolean }

    EvalTraceResponse:
      type: object
      required: [key, enabled, default_value, value, reason, rule_results]
      properties:
        key: { type: string }
        enabled: { type: boolean }
        default_value: { type: boolean }
        value: { type: boolean }
        reason:
          type: string
          enum: [disabled, matched_rule, default_no_match, cel_error]
        error: { type: string }
        matched_rule:
          $ref: "#/components/schemas/EvalMatchedRule"
        bucket:
          $ref: "#/components/schemas/EvalBucket"
        rule_results:
          type: array
          items:
            $ref: "#/components/schemas/EvalRuleResult"

    EvalAllResponse:
      type: object
      required: [flags]
      properties:
        flags:
          type: object
          additionalProperties:
            type: boolean

    APIKey:
      type: object
      required: [id, name, prefix, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        prefix: { type: string, example: fc_vT4... }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    CreatedAPIKey:
      allOf:
        - $ref: "#/components/schemas/APIKey"
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: Raw bearer token. It is returned once.

    FlagEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Flag"
    FlagListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Flag"
    RuleEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Rule"
    RuleListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Rule"
    ContextEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Context"
    ContextListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Context"
    EvalEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EvalResponse"
    EvalTraceEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EvalTraceResponse"
    EvalAllEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EvalAllResponse"
    APIKeyListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/APIKey"
    CreateAPIKeyEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreatedAPIKey"

    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - FLAG_NOT_FOUND
            - RULE_NOT_FOUND
            - CONTEXT_NOT_FOUND
            - CONTEXT_NAME_TAKEN
            - API_KEY_NOT_FOUND
            - INVALID_REQUEST
            - BAD_REQUEST
            - AUTH_NOT_CONFIGURED
            - INVALID_CREDENTIALS
            - UNAUTHORIZED
            - FORBIDDEN
            - INTERNAL_ERROR
        message:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication required
    FlagNotFound:
      description: Flag not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RuleNotFound:
      description: Rule not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ContextNotFound:
      description: Context not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    APIKeyNotFound:
      description: API key not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidRequest:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
