root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -buildvcs=false -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  include_ext = ["go", "tpl", "tmpl", "html", "sql", "yaml", "yml"]
  exclude_dir = ["tmp", "vendor", "internal/store/postgres/sqlcgen"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true

[misc]
  clean_on_exit = true
