version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/postgres/queries.sql"
    schema: "internal/store/postgres/migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/store/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
